services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.8.1
    restart: unless-stopped
    env_file:
      - ./.env.hetzner
    command:
      - --http-address=0.0.0.0:4180
      - --reverse-proxy=true
      - --provider=oidc
      - --email-domain=*
      - --upstream=static://202
      - --scope=openid profile email groups
      - --set-xauthrequest=true
      - --skip-provider-button=true
      - --cookie-secure=true
      - --cookie-refresh=1h
      - --cookie-expire=8h
    expose:
      - "4180"

  caddy:
    depends_on:
      oauth2-proxy:
        condition: service_started
    environment:
      CADDYFILE_NAME: Caddyfile.oidc
