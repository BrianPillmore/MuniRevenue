# =============================================================================
# MuniRev -- Docker Compose (production)
# =============================================================================
#
# Usage:
#   cp .env.example .env   # then edit secrets
#   docker compose up --build -d
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 128M
    # Postgres is only reachable from other compose services, not the host.
    # Uncomment the next two lines if you need direct access for debugging:
    # ports:
    #   - "5432:5432"

  # ---------------------------------------------------------------------------
  # MuniRev application (FastAPI + static frontend)
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    expose:
      - "8000"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"
        reservations:
          memory: 256M

  # ---------------------------------------------------------------------------
  # Caddy -- reverse proxy / automatic TLS
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"

volumes:
  pgdata:
  caddy_data:
  caddy_config:
